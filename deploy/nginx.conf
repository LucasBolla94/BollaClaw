# Nginx reverse proxy config for BollaClaw admin panel
# Place at: /etc/nginx/sites-available/bollaclaw
# Then: sudo ln -s /etc/nginx/sites-available/bollaclaw /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name admin.bolla.network;  # Change to your domain

    # Redirect HTTP to HTTPS (after setting up SSL with certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}

